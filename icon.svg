<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#0d0d1a"/>
  <!-- softball -->
  <circle cx="50" cy="46" r="28" fill="#ff3f3f"/>
  <!-- stitching lines -->
  <path d="M33 36 Q42 46 33 56" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M67 36 Q58 46 67 56" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- music note -->
  <text x="50" y="53" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white" font-weight="bold">♪</text>
  <!-- wordmark -->
  <text x="50" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9999bb" font-weight="700" letter-spacing="1">WALK-UP</text>
</svg>
