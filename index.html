<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Walk-Up">
  <meta name="theme-color" content="#0d0d1a">
  <title>Walk-Up Songs</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="app-header">
      <div class="header-inner">
        <span class="header-icon">🥎</span>
        <h1 id="header-title">Walk-Up Songs</h1>
        <button id="btn-share" class="btn-header-action" onclick="shareRoster()" aria-label="Share roster">
          <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
            <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92S19.61 16.08 18 16.08z"/>
          </svg>
        </button>
      </div>
    </header>

  <!-- Import banner (slides down when a shared roster URL is opened) -->
  <div id="import-banner" class="hidden">
    <div class="import-card">
      <span class="import-emoji">📋</span>
      <div class="import-text">
        <strong>Roster received!</strong>
        <span id="import-desc">X players</span>
      </div>
      <div class="import-btns">
        <button class="btn-import-no"  onclick="dismissImport()">Ignore</button>
        <button class="btn-import-yes" onclick="confirmImport()">Import</button>
      </div>
    </div>
  </div>

    <main id="content">
      <!-- Roster Tab -->
      <section id="tab-roster" class="tab-panel active">
        <div id="roster-list"></div>
        <button id="btn-add-player" class="fab" aria-label="Add player">
          <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>
        </button>
      </section>

      <!-- Game Tab -->
      <section id="tab-game" class="tab-panel">
        <div id="game-view"></div>
      </section>
    </main>

    <nav id="tab-bar">
      <button class="tab-btn active" data-tab="roster">
        <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
          <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
        </svg>
        <span>Roster</span>
      </button>
      <button class="tab-btn" data-tab="game">
        <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
          <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
        <span>Game</span>
      </button>
    </nav>
  </div>

  <!-- Add/Edit Modal -->
  <div id="modal-overlay" class="hidden" role="dialog" aria-modal="true">
    <div id="modal">
      <div class="modal-handle"></div>
      <h2 id="modal-title">Add Player</h2>
      <form id="player-form" novalidate>
        <div class="form-row">
          <div class="form-group form-group-sm">
            <label for="input-number">Jersey #</label>
            <input type="number" id="input-number" placeholder="7" min="0" max="99" inputmode="numeric">
          </div>
          <div class="form-group form-group-lg">
            <label for="input-name">Player Name <span class="required">*</span></label>
            <input type="text" id="input-name" placeholder="First Last" autocomplete="name" autocapitalize="words">
          </div>
        </div>
        <div class="form-group">
          <label for="input-song">Song Name</label>
          <input type="text" id="input-song" placeholder="Eye of the Tiger" autocapitalize="words">
        </div>
        <div class="form-group">
          <label for="input-spotify">Spotify Link</label>
          <input type="url" id="input-spotify" placeholder="https://open.spotify.com/track/…" autocomplete="off" autocorrect="off" spellcheck="false">
          <span id="spotify-status" aria-live="polite"></span>
        </div>
        <div class="form-actions">
          <button type="button" id="btn-cancel" class="btn-secondary">Cancel</button>
          <button type="submit" id="btn-save" class="btn-primary">Save Player</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
